<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SudokuAI — Smart Solver</title>
  <meta name="description" content="AI-powered Sudoku solver with OCR recognition and interactive game modes.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Loading Overlay ──────────────────────── -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p id="loading-text" class="loading-text">Loading...</p>
  </div>

  <!-- ── Confirm Modal ────────────────────────── -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Solve Entire Puzzle?</h3>
      <p>This will fill in all remaining cells. Are you sure?</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-outline">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Yes, Solve</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ────────────────────────────────── -->
  <div id="toast" class="toast hidden">
    <span id="toast-text"></span>
    <button id="toast-close" class="toast-close">✕</button>
  </div>

  <!-- ── Home Screen ──────────────────────────── -->
  <div id="home-screen" class="screen home-screen">
    <div class="home-content">
      <div class="home-logo">🧩</div>
      <h1 class="home-title">SudokuAI</h1>
      <p class="home-subtitle">Smart Solver & Game</p>

      <div class="home-section">
        <h2 class="home-section-title">Play a Game</h2>
        <div class="difficulty-grid">
          <button class="diff-btn diff-easy" data-difficulty="easy">
            <span class="diff-icon">🟢</span>
            <span class="diff-label">Easy</span>
          </button>
          <button class="diff-btn diff-medium" data-difficulty="medium">
            <span class="diff-icon">🟡</span>
            <span class="diff-label">Medium</span>
          </button>
          <button class="diff-btn diff-hard" data-difficulty="hard">
            <span class="diff-icon">🟠</span>
            <span class="diff-label">Hard</span>
          </button>
          <button class="diff-btn diff-expert" data-difficulty="expert">
            <span class="diff-icon">🔴</span>
            <span class="diff-label">Expert</span>
          </button>
        </div>
      </div>

      <div class="home-divider"><span>or</span></div>

      <div class="home-section">
        <h2 class="home-section-title">Solve a Puzzle</h2>
        <div class="solve-buttons">
          <button id="btn-scan" class="action-btn">
            <span class="action-icon">📷</span>
            <span class="action-label">Scan Image</span>
          </button>
          <button id="btn-manual-entry" class="action-btn">
            <span class="action-icon">✏️</span>
            <span class="action-label">Enter Manually</span>
          </button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>

      <div id="preview-area" class="preview-area hidden">
        <img id="preview-img" alt="Uploaded puzzle preview">
      </div>
    </div>
    <span class="version-label">v2.2</span>
  </div>

  <!-- ── Game Screen ──────────────────────────── -->
  <div id="game-screen" class="screen game-screen hidden">

    <!-- Top Bar -->
    <div class="game-topbar">
      <button id="btn-back" class="topbar-btn">← Back</button>
      <div class="topbar-center">
        <span id="game-difficulty" class="game-badge"></span>
        <span id="game-timer" class="game-timer">00:00</span>
      </div>
      <button id="btn-new" class="topbar-btn">New</button>
    </div>
    <span id="game-errors" class="hidden">0</span>

    <!-- Grid -->
    <div id="grid-container" class="grid-wrapper"></div>

    <!-- Action Buttons -->
    <div class="action-bar">
      <button id="btn-undo" class="tool-btn" disabled>
        <span class="tool-icon">↩</span>
        <span class="tool-label">Undo</span>
      </button>
      <button id="btn-erase" class="tool-btn" disabled>
        <span class="tool-icon">⌫</span>
        <span class="tool-label">Erase</span>
      </button>
      <button id="btn-candidates" class="tool-btn" disabled>
        <span class="tool-icon">✎</span>
        <span class="tool-label">Notes</span>
      </button>
      <button id="btn-next-step" class="tool-btn" disabled>
        <span class="tool-icon">💡</span>
        <span class="tool-label">Hint</span>
      </button>
    </div>

    <!-- Number Pad -->
    <div id="number-pad" class="number-pad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
    </div>

    <!-- Hidden buttons for compatibility -->
    <button id="btn-solve-all" class="hidden" disabled></button>
    <button id="btn-edit-toggle" class="hidden" disabled></button>
    <button id="btn-clear" class="hidden" disabled></button>
    <button id="btn-check" class="hidden" disabled></button>
    <span id="hint-counter" class="hidden"></span>

    <!-- Hint Panel (fixed bottom overlay, covers controls) -->
    <div id="hint-panel" class="hint-panel hidden">
      <div class="hint-header">
        <span id="hint-badge" class="hint-badge">Hint</span>
        <button id="btn-hint-close" type="button" class="hint-close-btn">✕</button>
      </div>
      <div class="hint-body">
        <p id="hint-content" class="hint-text"></p>
      </div>
      <div class="hint-footer">
        <div class="hint-dots" id="hint-dots"></div>
        <div class="hint-nav-btns">
          <button id="btn-hint-prev" class="hint-arrow">‹</button>
          <button id="btn-hint-next" class="hint-arrow">›</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── External Libraries ───────────────────── -->
  <script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="console.log('OpenCV.js loaded')"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- ── App ──────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
