workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kaan.sudokusolver
      vars:
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Copy web assets
        script: |
          rm -rf www
          mkdir -p www/js
          cp index.html www/
          cp styles.css www/
          cp js/*.js www/js/
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
      - name: Export IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App \
            --archive-directory build
    artifacts:
      - ios/App/build/**/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Copy web assets
        script: |
          rm -rf www
          mkdir -p www/js
          cp index.html www/
          cp styles.css www/
          cp js/*.js www/js/
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
